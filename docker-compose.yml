version: "3.9"

# ══════════════════════════════════════════════════════════════════════
#  DEUX MODES DE DÉMARRAGE :
#
#  Mode simple (Redis direct) — recommandé pour dev/démo :
#    docker compose up redis profiles-loader simulator dashboard
#
#  Mode complet (Kafka + Spark) — pipeline production :
#    docker compose --profile kafka up
# ══════════════════════════════════════════════════════════════════════

services:

  # ── Redis ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fraud_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── Profils utilisateurs (one-shot) ───────────────────────────────
  profiles-loader:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fraud_profiles_loader
    command: python -m data.initial_profiles
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      redis:
        condition: service_healthy
    restart: "no"

  # ── Simulateur Redis-direct (mode simple) ─────────────────────────
  simulator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fraud_simulator
    command: python -m simulator.data_simulator
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      profiles-loader:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Dashboard Streamlit ────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fraud_dashboard
    command: >
      streamlit run dashboard/app.py
      --server.port=8501
      --server.address=0.0.0.0
    ports:
      - "8501:8501"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ════════════════════════════════════════════════════════════════════
  #  PIPELINE KAFKA (profil "kafka") — mode production
  #  Lancer avec : docker compose --profile kafka up
  # ════════════════════════════════════════════════════════════════════

  # ── Kafka (KRaft, sans ZooKeeper) ─────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: fraud_kafka
    profiles: ["kafka"]
    user: root
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9093,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9093,EXTERNAL://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9094"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: "/var/kafka-logs"
      CLUSTER_ID: "X1UPky9yRMq5ooui7VoUAA"
    volumes:
      - kafka-data:/var/kafka-logs
    command: >
      bash -c "
        mkdir -p /var/kafka-logs &&
        chmod -R 777 /var/kafka-logs &&
        /etc/confluent/docker/run
      "
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  # ── Kafka UI (visualisation topics) ───────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: fraud_kafka_ui
    profiles: ["kafka"]
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "fraud-detection"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9093"
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ── Producteur Kafka (remplace le simulateur en mode kafka) ───────
  kafka-producer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fraud_kafka_producer
    profiles: ["kafka"]
    command: python -m kafka.producer
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9093"
    depends_on:
      kafka:
        condition: service_healthy
      profiles-loader:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Spark Processor (consomme Kafka → Redis) ───────────────────────
  spark-processor:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: fraud_spark_processor
    profiles: ["kafka"]
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9093"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  kafka-data:
